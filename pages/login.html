<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Bang Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/login.css" />
</head>
<body>
  <div class="login-screen">
    <div class="login-split-card">
      <!-- ---------- Left: login form ---------- -->
      <div class="login-split-card__left">
        <div class="login-split-card__logo" id="login-brand">Bang Order</div>

        <div class="login-split-card__form-wrap">
          <h1 id="login-title"></h1>
          <p class="login-card__subtitle" id="login-subtitle"></p>

          <div id="login-error-mount"></div>

          <form class="login-form" id="login-form">
            <div class="field">
              <label id="label-email"></label>
              <input class="input" type="email" id="email" placeholder="you@example.com" required />
            </div>
            <div class="field">
              <label id="label-password"></label>
              <input class="input" type="password" id="password" placeholder="••••••••" required />
            </div>
            <button class="btn btn-primary" type="submit" id="login-btn" style="margin-top:8px;"></button>
          </form>
        </div>

        <div class="login-split-card__footer">
          <span id="login-copyright"></span>
          <div class="login-split-card__footer-links">
            <!-- TODO (buyer): point these at your real FAQ / contact pages before going live -->
            <a href="#" id="login-faq-link"></a>
            <a href="mailto:hello@example.com" id="login-contact-link"></a>
          </div>
        </div>
      </div>

      <!-- ---------- Right: marketing panel ---------- -->
      <div class="login-split-card__right">
        <div class="login-split-card__decor-circle"></div>
        <div class="login-split-card__right-content">
          <h2 id="login-marketing-heading"></h2>
          <p id="login-marketing-body"></p>
        </div>
        <div class="login-split-card__footer">
          <div class="login-split-card__footer-links">
            <!-- TODO (buyer): point these at your real FAQ / contact pages before going live -->
            <a href="#" id="login-faq-link-2"></a>
            <a href="mailto:hello@example.com" id="login-contact-link-2"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/i18n/translations.js"></script>
  <script src="../js/i18n/i18n.js"></script>
  <script>document.documentElement.lang = I18n.getLocale();</script>
  <script src="../js/config/supabase.config.js"></script>
  <script src="../js/utils/validators.js"></script>
  <script src="../js/services/auth.service.js"></script>
  <script src="../js/services/appSettings.service.js"></script>

  <script>
    (async function () {
      document.getElementById('login-title').textContent = t('login.welcomeBack');
      document.getElementById('login-subtitle').textContent = t('login.subtitle');
      document.getElementById('label-email').textContent = t('login.email');
      document.getElementById('label-password').textContent = t('login.password');
      document.getElementById('login-btn').textContent = t('login.loginButton');
      document.getElementById('login-copyright').textContent = t('login.copyright', { year: new Date().getFullYear() });
      document.getElementById('login-marketing-heading').textContent = t('login.marketing.heading');
      document.getElementById('login-marketing-body').textContent = t('login.marketing.body');
      ['login-faq-link', 'login-faq-link-2'].forEach((id) => (document.getElementById(id).textContent = t('login.faqLink')));
      ['login-contact-link', 'login-contact-link-2'].forEach((id) => (document.getElementById(id).textContent = t('login.contactLink')));

      // Branding is public-readable (see app_settings RLS) since this
      // page renders before the user has authenticated. Per product
      // decision, the wordmark here stays TEXT (matching the reference
      // design's plain text logo) — a custom uploaded logo, if any,
      // shows as a small mark next to the name rather than replacing it.
      try {
        const branding = await AppSettingsService.get();
        document.title = `Log in · ${branding.appName}`;
        const logoImg = branding.logoDataUrl ? `<img src="${branding.logoDataUrl}" alt="" />` : '';
        document.getElementById('login-brand').innerHTML = `${logoImg}<span>${branding.appName}</span>`;
      } catch (err) {
        console.error(err); // fall back silently to the default "Bang Order" text already in the page
      }

      // If already logged in, skip straight to dashboard
      const session = await AuthService.getSession();
      if (session) {
        window.location.href = '/pages/dashboard.html';
        return;
      }

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errorMount = document.getElementById('login-error-mount');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMount.innerHTML = '';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!Validators.validateEmail(email)) {
          showError(t('login.invalidEmail'));
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> ${t('login.loggingIn')}`;

        try {
          await AuthService.signIn(email, password);
          window.location.href = '/pages/dashboard.html';
        } catch (err) {
          showError(err.message || t('login.invalidCreds'));
          btn.disabled = false;
          btn.textContent = t('login.loginButton');
        }
      });

      function showError(message) {
        errorMount.innerHTML = `
          <div class="login-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>${message}</span>
          </div>`;
      }
    })();
  </script>
</body>
</html>
