<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · Bang Order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/login.css" />
</head>
<body>
  <div class="login-screen">
    <div class="login-card">
      <div class="login-card__brand">
        <span class="sidebar__brand-mark">B</span>
        <span style="font-weight:700; font-size:16px;">Bang Order</span>
      </div>
      <h1>Welcome back</h1>
      <p class="login-card__subtitle">Log in to recap and validate your Shopee orders.</p>

      <div id="login-error-mount"></div>

      <form class="login-form" id="login-form">
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" type="password" id="password" placeholder="••••••••" required />
        </div>
        <button class="btn btn-primary" type="submit" id="login-btn" style="margin-top:8px;">
          Log In
        </button>
      </form>

      <div class="login-card__footer">Bang Order · Shopee order recap tool</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config/supabase.config.js"></script>
  <script src="../js/utils/validators.js"></script>
  <script src="../js/services/auth.service.js"></script>

  <script>
    (async function () {
      // If already logged in, skip straight to dashboard
      const session = await AuthService.getSession();
      if (session) {
        window.location.href = '/pages/dashboard.html';
        return;
      }

      const form = document.getElementById('login-form');
      const btn = document.getElementById('login-btn');
      const errorMount = document.getElementById('login-error-mount');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMount.innerHTML = '';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!Validators.validateEmail(email)) {
          showError('Please enter a valid email address.');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Logging in...';

        try {
          await AuthService.signIn(email, password);
          window.location.href = '/pages/dashboard.html';
        } catch (err) {
          showError(err.message || 'Invalid email or password.');
          btn.disabled = false;
          btn.textContent = 'Log In';
        }
      });

      function showError(message) {
        errorMount.innerHTML = `
          <div class="login-error" style="margin-bottom:16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>${message}</span>
          </div>`;
      }
    })();
  </script>
</body>
</html>
